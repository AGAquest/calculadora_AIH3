<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Motor de Combate Táctico - Sandbox</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">
    <h1>Sistema de Combate Avanzado</h1>
    
    <div class="mode-setup">
      <button id="btnAddSlot" class="btn-primary" style="width: 100%; font-size: 1.2rem; padding: 1rem;">➕ Agregar Nuevo Combatiente al Campo</button>
    </div>

    <div class="turn-counter">
      <h2>Turno Actual: <span id="turnoDisplay">1</span></h2>
    </div>

    <div class="battlefield" id="battlefield">
      </div>

    <div class="action-buttons-container">
      <button id="btnDeshacer" class="btn-undo">↩ Deshacer Turno</button>
      <button id="btnCalcular">Procesar Intercambio ⚡</button>
    </div>

    <div class="results" id="resultados"></div>
  </div>

  <div id="modal-roster" class="modal-overlay" style="display: none;">
    <div class="modal-content">
      <button id="close-modal" class="btn-close-modal">✖ Cerrar</button>
      <h2>Selecciona un Combatiente</h2>
      <div id="roster-grid" class="roster-grid"></div>
    </div>
  </div>

  <div id="modal-clon" class="modal-overlay" style="display: none;">
    <div class="modal-content clon-modal">
      <button id="close-modal-clon" class="btn-close-modal">✖ Cerrar</button>
      <h2>Desplegar Holograma</h2>
      <p>Selecciona el Slot que será sobrescrito con el clon del personaje actual.</p>
      <div id="clon-options" class="clon-options-container"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
